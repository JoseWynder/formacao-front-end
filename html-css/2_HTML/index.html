<!DOCTYPE html>
<html>

<head>
    <title>HTML fundamentos 2</title>
</head>

<body style="padding-bottom: 500px;">
    <!-- 1 - títulos -->
    <h1>Este é um título importante</h1>
    <h3>Um novo título</h3>

    <!-- 2 - parágrafos -->
    <p>Descrição dos nossos serviços</p>
    <p>Mais um parágrafo</p>

    <!-- 3 - tags sem conteúdo -->
    <p>Um parágrafo</p>
    <br />
    <p>Segundo parágrafo</p>
    <hr />
    <p>Terceiro parágrafo</p>

    <!-- 4 - comentários -->
    <!-- Este é um comentário -->
    <h2>Mais um título</h2>
    <!-- Outro comentário -->

    <!-- 5 - atributos -->
    <a href="https://www.google.com">Google</a>
    <br />

    <!-- 6 - abrir link nova aba -->
    <a href="https://google.com" target="_blank">Google nova aba</a>
    <br />

    <!-- 7 - imagem -->
    <img src="img/besouro.jpg" />

    <!-- 8 - atributo alt -->
    <img src="img/gado.jpg" alt="Gado das terras altas" />

    <!-- 9 - listas não ordenadas -->
     <ul>
        <li>Carros</li>
        <li>Navios</li>
        <li>Submaninos</li>
        <li>Aviões</li>
     </ul>
</body>

</html>
